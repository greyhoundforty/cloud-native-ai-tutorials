name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy to Netlify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build MkDocs site
        run: mkdocs build --strict

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Deploy to Netlify (production)
        id: netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          OUTPUT=$(netlify deploy --prod --dir=site --json)
          echo "$OUTPUT"
          LIVE_URL=$(echo "$OUTPUT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('url', d.get('deploy_url', '')))")
          echo "live_url=$LIVE_URL" >> $GITHUB_OUTPUT

      - name: Write deployment summary
        run: |
          echo "## Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Live URL:** ${{ steps.netlify.outputs.live_url }}" >> $GITHUB_STEP_SUMMARY
