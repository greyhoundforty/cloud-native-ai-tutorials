apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ollama.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ollama.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ollama.selectorLabels" . | nindent 6 }}
  strategy:
    # RollingUpdate with maxUnavailable=0 ensures zero-downtime upgrades.
    # GPU pods are single-replica by default; Recreate avoids PVC attachment conflicts.
    type: Recreate
  template:
    metadata:
      labels:
        {{- include "ollama.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      {{- if .Values.gpu.runtimeClassName }}
      runtimeClassName: {{ .Values.gpu.runtimeClassName }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Init container: pull the model before the server starts.
      # This ensures the model is fully available on startup and avoids
      # the readiness probe failing while a large model is still downloading.
      initContainers:
        - name: model-pull
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -c
            - |
              # Start the server in the background, wait for it to be ready,
              # pull the model, then shut down the background server.
              ollama serve &
              SERVER_PID=$!
              echo "Waiting for Ollama server to start..."
              until ollama list > /dev/null 2>&1; do
                sleep 2
              done
              echo "Pulling model: {{ .Values.model }}"
              ollama pull {{ .Values.model }}
              echo "Model pull complete. Stopping background server."
              kill $SERVER_PID
              wait $SERVER_PID 2>/dev/null || true
          volumeMounts:
            - name: ollama-models
              mountPath: {{ .Values.storage.mountPath }}
          # The init container also needs GPU access so Ollama can
          # verify CUDA availability during the pull phase.
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2"
              {{- if .Values.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.gpu.count }}
              {{- end }}

      containers:
        - name: ollama
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["ollama", "serve"]
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0:11434"
            - name: OLLAMA_MODELS
              value: {{ .Values.storage.mountPath }}/models
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: ollama-models
              mountPath: {{ .Values.storage.mountPath }}
          resources:
            {{- if .Values.gpu.enabled }}
            requests:
              {{- toYaml .Values.resources.requests | nindent 14 }}
              nvidia.com/gpu: {{ .Values.gpu.count }}
            limits:
              {{- toYaml .Values.resources.limits | nindent 14 }}
              nvidia.com/gpu: {{ .Values.gpu.count }}
            {{- else }}
            requests:
              {{- toYaml .Values.resources.requests | nindent 14 }}
            limits:
              {{- toYaml .Values.resources.limits | nindent 14 }}
            {{- end }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}

      volumes:
        - name: ollama-models
          persistentVolumeClaim:
            claimName: {{ include "ollama.fullname" . }}-models
