{{- if not .Values.anthropic.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rag-service.fullname" . }}-anthropic
  labels:
    {{- include "rag-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.anthropic.secretKey }}: {{ .Values.anthropic.apiKey | quote }}
{{- end }}
---
{{- if and (not .Values.postgresql.enabled) (not .Values.externalDatabase.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rag-service.fullname" . }}-db
  labels:
    {{- include "rag-service.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: "postgresql://{{ .Values.externalDatabase.user }}:{{ .Values.externalDatabase.password }}@{{ .Values.externalDatabase.host }}:{{ .Values.externalDatabase.port }}/{{ .Values.externalDatabase.database }}"
{{- end }}
