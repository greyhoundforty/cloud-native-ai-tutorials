apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rag-service.fullname" . }}-config
  labels:
    {{- include "rag-service.labels" . | nindent 4 }}
data:
  CLAUDE_MODEL: {{ .Values.config.claudeModel | quote }}
  EMBED_MODEL: {{ .Values.config.embedModel | quote }}
  TOP_K: {{ .Values.config.topK | quote }}
  MAX_TOKENS: {{ .Values.config.maxTokens | quote }}
  CHUNK_SIZE: {{ .Values.config.chunkSize | quote }}
  CHUNK_OVERLAP: {{ .Values.config.chunkOverlap | quote }}
