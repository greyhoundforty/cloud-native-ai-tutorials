# IMPORTANT: Do NOT commit a real API key here.
# Populate ANTHROPIC_API_KEY with a base64-encoded value before applying:
#
#   echo -n "sk-ant-..." | base64
#
# Then replace the placeholder below, or use the one-liner:
#
#   kubectl create secret generic claude-demo-secret \
#     --namespace claude-demo \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
#
# If you use the kubectl command, skip applying this file.
apiVersion: v1
kind: Secret
metadata:
  name: claude-demo-secret
  namespace: claude-demo
type: Opaque
data:
  # Replace with: echo -n "sk-ant-YOUR_KEY" | base64
  ANTHROPIC_API_KEY: REPLACE_WITH_BASE64_ENCODED_KEY
