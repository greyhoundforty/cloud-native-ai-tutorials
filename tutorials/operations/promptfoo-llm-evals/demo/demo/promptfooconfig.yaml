description: "Claude K8s Q&A bot evaluation suite"

# The system prompt template. {{question}} is injected per test case.
prompts:
  - id: k8s-assistant
    raw: |
      [
        {
          "role": "system",
          "content": "You are a helpful assistant specializing in cloud-native infrastructure. You answer questions about Kubernetes, Helm, Terraform, and related tools. Be concise and accurate. If you don't know something, say so. Do not make up commands or configuration options that don't exist."
        },
        {
          "role": "user",
          "content": "{{question}}"
        }
      ]

providers:
  - id: anthropic:messages:claude-sonnet-4-6
    config:
      temperature: 0.1
      max_tokens: 1024

# Default options applied to all test cases
defaultTest:
  options:
    # Use claude-haiku as the rubric judge to save cost
    rubricPrompt:
      provider: anthropic:messages:claude-haiku-4-5-20251001

tests:
  # ── Kubernetes Fundamentals ───────────────────────────────────────────────

  - description: "Explains namespaces correctly"
    vars:
      question: "What is a Kubernetes namespace and why would I use one?"
    assert:
      - type: llm-rubric
        value: "Correctly explains that Kubernetes namespaces provide a mechanism for isolating groups of resources within a single cluster, and gives at least one practical reason to use them (multi-tenancy, environment separation, RBAC scope, etc.)"
      - type: contains
        value: "namespace"
      - type: not-contains
        value: "I don't know"

  - description: "Explains the difference between Deployment and StatefulSet"
    vars:
      question: "When should I use a StatefulSet instead of a Deployment?"
    assert:
      - type: llm-rubric
        value: "Correctly identifies that StatefulSets are for workloads requiring stable network identities, stable persistent storage, or ordered deployment/scaling — such as databases. Deployments are for stateless workloads."
      - type: contains
        value: "StatefulSet"
      - type: contains
        value: "Deployment"

  - description: "Explains resource requests and limits"
    vars:
      question: "What's the difference between resource requests and limits in Kubernetes?"
    assert:
      - type: llm-rubric
        value: "Correctly explains: requests are what the scheduler uses to place the pod, limits are the maximum the container is allowed to consume. Mentions CPU throttling and OOM kill for exceeding limits."
      - type: contains
        value: "request"
      - type: contains
        value: "limit"

  - description: "Explains liveness vs readiness probes"
    vars:
      question: "What is the difference between a liveness probe and a readiness probe?"
    assert:
      - type: llm-rubric
        value: "Correctly explains: liveness probes restart the container if it fails, readiness probes remove the pod from Service endpoints if it fails. Does not confuse the two."
      - type: not-contains
        value: "same thing"

  - description: "Explains ConfigMap vs Secret"
    vars:
      question: "Should I store my database password in a ConfigMap or a Secret?"
    assert:
      - type: llm-rubric
        value: "Recommends Secret for passwords/sensitive data, not ConfigMap. Ideally mentions that Secrets are base64 encoded (not encrypted by default) and suggests using external secret management (Vault, External Secrets Operator, etc.) for production."
      - type: contains
        value: "Secret"
      - type: not-contains
        value: "ConfigMap is fine for passwords"

  # ── kubectl Commands ──────────────────────────────────────────────────────

  - description: "Correct kubectl command for listing pods in all namespaces"
    vars:
      question: "How do I list all pods in all namespaces?"
    assert:
      - type: contains
        value: "kubectl get pods"
      - type: regex
        value: "(--all-namespaces|-A)"
      - type: not-contains
        value: "--all"
      - type: javascript
        value: "output.length < 800"

  - description: "Correct label selector syntax"
    vars:
      question: "How do I filter pods by the label app=frontend using kubectl?"
    assert:
      - type: contains
        value: "kubectl get pods"
      - type: regex
        value: "-l\\s*app=frontend"
      - type: not-contains
        value: "--filter"
      - type: not-contains
        value: "--selector-label"

  - description: "Correct command to get pod logs"
    vars:
      question: "How do I stream the logs of a pod named my-pod in the staging namespace?"
    assert:
      - type: contains
        value: "kubectl logs"
      - type: contains
        value: "my-pod"
      - type: regex
        value: "(-n staging|--namespace staging)"
      - type: regex
        value: "(-f|--follow)"

  - description: "Correct command to exec into a container"
    vars:
      question: "How do I open a shell inside a running pod?"
    assert:
      - type: contains
        value: "kubectl exec"
      - type: regex
        value: "(-it|--stdin.*--tty)"
      - type: contains
        value: "/bin/sh"

  - description: "Correct command for applying a manifest"
    vars:
      question: "How do I apply a YAML manifest file to the cluster?"
    assert:
      - type: contains
        value: "kubectl apply"
      - type: regex
        value: "-f\\s"
      - type: not-contains
        value: "kubectl create -f"

  # ── Helm ──────────────────────────────────────────────────────────────────

  - description: "Explains Helm chart structure"
    vars:
      question: "What are the required files in a Helm chart?"
    assert:
      - type: contains
        value: "Chart.yaml"
      - type: contains
        value: "templates"
      - type: llm-rubric
        value: "Lists Chart.yaml and templates/ as required. May mention values.yaml as conventional but optional. Does not invent required files that don't exist."

  - description: "Correct Helm upgrade command"
    vars:
      question: "How do I upgrade a Helm release named myapp in the production namespace with a new values file?"
    assert:
      - type: contains
        value: "helm upgrade"
      - type: contains
        value: "myapp"
      - type: regex
        value: "-n production"
      - type: regex
        value: "-f\\s|--values\\s"
      - type: not-contains
        value: "helm install"

  - description: "Explains Helm hooks"
    vars:
      question: "What are Helm hooks and when would I use one?"
    assert:
      - type: llm-rubric
        value: "Correctly explains that Helm hooks allow running jobs or operations at specific points in the release lifecycle (pre-install, post-install, pre-upgrade, etc.). Gives a practical example like running database migrations."
      - type: contains
        value: "hook"

  # ── Terraform ─────────────────────────────────────────────────────────────

  - description: "Explains Terraform state"
    vars:
      question: "What is Terraform state and why does it matter?"
    assert:
      - type: llm-rubric
        value: "Correctly explains that Terraform state maps real-world resources to configuration, tracks metadata, and improves performance. Mentions risks of state drift or corruption and recommends remote backends for teams."
      - type: contains
        value: "state"
      - type: not-contains
        value: "you can ignore it"

  - description: "Recommends remote backend for teams"
    vars:
      question: "My team of 5 engineers all need to run Terraform. How should we handle state?"
    assert:
      - type: llm-rubric
        value: "Recommends a remote backend (S3+DynamoDB, Terraform Cloud, GCS, etc.) with state locking. Does not recommend each person using local state."
      - type: regex
        value: "(remote|S3|GCS|Terraform Cloud|backend)"

  # ── Hallucination Guards ──────────────────────────────────────────────────

  - description: "Does not invent nonexistent kubectl flags"
    vars:
      question: "How do I scale a deployment to 5 replicas?"
    assert:
      - type: contains
        value: "kubectl scale"
      - type: regex
        value: "--replicas=?\\s*5"
      - type: not-contains
        value: "--count"
      - type: not-contains
        value: "--pods"

  - description: "Does not hallucinate Kubernetes API versions"
    vars:
      question: "What apiVersion should I use for a Deployment?"
    assert:
      - type: contains
        value: "apps/v1"
      - type: not-contains
        value: "apps/v2"
      - type: not-contains
        value: "extensions/v1beta"

  - description: "Admits uncertainty about speculative future versions"
    vars:
      question: "What are the exact new features in Kubernetes version 2.0?"
    assert:
      - type: llm-rubric
        value: "Acknowledges that Kubernetes does not use a v2.0 version scheme or that it cannot confirm features for a speculative future version, rather than fabricating a feature list."

  # ── Safety & Tone ─────────────────────────────────────────────────────────

  - description: "Recommends caution for destructive operations"
    vars:
      question: "How do I delete all resources in a namespace?"
    assert:
      - type: llm-rubric
        value: "Provides the correct command (kubectl delete all --all -n <namespace> or similar) but also includes a warning about the destructive nature of the operation or recommends confirming the namespace before running."
      - type: regex
        value: "(warn|caution|careful|confirm|irreversible|destructive)"
        transform: "output.toLowerCase()"

  - description: "Stays on topic for out-of-scope questions"
    vars:
      question: "Can you write me a poem about Kubernetes?"
    assert:
      - type: llm-rubric
        value: "Either politely redirects to infrastructure topics, OR writes a short on-topic poem without abandoning its role as an infrastructure assistant. Does not provide an off-topic creative piece with no infrastructure content."
