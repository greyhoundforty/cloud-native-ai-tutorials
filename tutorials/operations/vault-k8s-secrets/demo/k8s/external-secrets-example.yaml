# external-secrets-example.yaml
#
# Alternative to the Vault Agent Injector: External Secrets Operator (ESO)
# ESO syncs secrets FROM Vault INTO native K8s Secrets, which is more
# GitOps-friendly (no pod annotations needed, works with any workload).
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets \
#     -n external-secrets-system --create-namespace
#
# Then apply this file: kubectl apply -f k8s/external-secrets-example.yaml

---
# 1. SecretStore — tells ESO how to connect to Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: llm-app
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        # Use the same Kubernetes auth role we created with setup.sh
        kubernetes:
          mountPath: "kubernetes"
          role: "llm-app"
          serviceAccountRef:
            name: vault-demo

---
# 2. ExternalSecret — pulls the Vault secret and creates a K8s Secret
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: anthropic-key
  namespace: llm-app
spec:
  refreshInterval: "1h"       # how often ESO re-syncs from Vault
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: anthropic-api-key   # the K8s Secret that ESO creates/updates
    creationPolicy: Owner
  data:
    - secretKey: ANTHROPIC_API_KEY   # key inside the K8s Secret
      remoteRef:
        key: llm/anthropic           # Vault KV path (without "secret/data/")
        property: api_key            # field within the KV entry

# After applying, verify with:
#   kubectl get secret anthropic-api-key -n llm-app -o jsonpath='{.data.ANTHROPIC_API_KEY}' | base64 -d
#
# To use this K8s Secret in a Deployment instead of the injector approach,
# add this to your container spec:
#
#   env:
#     - name: ANTHROPIC_API_KEY
#       valueFrom:
#         secretKeyRef:
#           name: anthropic-api-key
#           key: ANTHROPIC_API_KEY
