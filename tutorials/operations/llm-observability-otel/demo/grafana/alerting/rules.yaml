apiVersion: 1

groups:
  - orgId: 1
    name: llm-alerts
    folder: LLM Alerts
    interval: 1m
    rules:
      - uid: llm-high-latency
        title: LLM p95 Latency > 10s
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: >
                histogram_quantile(0.95,
                  sum by(le) (rate(llm_llm_request_duration_seconds_bucket[5m]))
                )
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    params: [10]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
        noDataState: NoData
        execErrState: Alerting
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "LLM p95 latency exceeded 10s"
          description: "p95 latency is {{ humanizeDuration $value }} over the last 5 minutes"

      - uid: llm-token-burn-spike
        title: Token Burn Rate > 10k tokens/min
        condition: C
        data:
          - refId: A
            datasourceUid: prometheus
            model:
              expr: >
                sum(rate(llm_llm_usage_input_tokens_sum[2m]) +
                    rate(llm_llm_usage_output_tokens_sum[2m])) * 60
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            datasourceUid: "__expr__"
            model:
              type: threshold
              conditions:
                - evaluator:
                    params: [10000]
                    type: gt
                  operator:
                    type: and
                  query:
                    params: [A]
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Token burn rate spike detected"
          description: "{{ humanize $value }} tokens/min — check for runaway loops or prompt injection"
